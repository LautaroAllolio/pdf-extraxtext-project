services:
  mongodb:
    image: mongo:8.2
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${ROOT_USERNAME}:${ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb

  api:
    build: .
    container_name: papersoul-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://${ROOT_USERNAME}:${ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      SECRET_KEY: ${SECRET_KEY}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES}
      MIN_TEXT_LENGTH: ${MIN_TEXT_LENGTH}
      MIN_DPI: ${MIN_DPI}
    depends_on:
      - mongodb

volumes:
  mongodb_data: